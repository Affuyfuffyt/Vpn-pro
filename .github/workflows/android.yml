name: Build V2Ray VPN APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. تحميل الكود
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. تحميل المكتبة يدوياً (لحل مشكلة JitPack)
    - name: Download LibV2Ray AAR manually
      run: |
        mkdir -p app/libs
        curl -L -o app/libs/libv2ray.aar https://github.com/2dust/AndroidLibXrayLite/releases/download/0.7.0/libv2ray.aar

    # 3. تجهيز الجافا
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 4. (الخطوة التي نسيناها) إجبار النظام على استخدام Gradle 8.2
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    # 5. بناء التطبيق
    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon

    # 6. رفع ملف الـ APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vpn-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
