name: Build V2Ray VPN APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. تحميل الكود الخاص بك
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. تجهيز بيئة الجافا (تم التحديث إلى 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. محاولة إعطاء صلاحية التنفيذ (احتياطي)
    - name: Make gradlew executable
      run: chmod +x gradlew || true

    # 4. بناء ملف الـ APK باستخدام Gradle المثبت في السيرفر
    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon

    # 5. رفع ملف الـ APK الناتج لكي تحمله أنت
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vpn-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
