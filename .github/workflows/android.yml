name: Build V2Ray VPN APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. تحميل الكود
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. تجهيز الجافا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. تحديث Gradle إلى 8.2 (هنا التعديل)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    # 4. بناء التطبيق
    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon

    # 5. رفع ملف الـ APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vpn-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
